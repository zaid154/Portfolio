<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glowA" cx="18%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#1b2b3a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1b2b3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="86%" cy="8%" r="50%">
      <stop offset="0%" stop-color="#2a2438" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2a2438" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="72%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#14313a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#14313a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="40%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="#0a0a0f"/>
  <rect width="1920" height="1200" fill="url(#glowA)"/>
  <rect width="1920" height="1200" fill="url(#glowB)"/>
  <rect width="1920" height="1200" fill="url(#glowC)"/>
  <rect width="1920" height="1200" fill="url(#vignette)"/>
  <rect width="1920" height="1200" filter="url(#grain)" opacity="0.6"/>
</svg>
