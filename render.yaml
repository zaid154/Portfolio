services:
  - type: web
    name: portfolio-cms-api
    env: node
    plan: free
    # Backend-only: the React client is deployed separately on Vercel. Render only
    # installs and runs the Express API. (app.js still serves client/dist if present,
    # which is a harmless no-op here since we don't build the client on Render.)
    buildCommand: npm install --prefix server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # CORS allow-list — set to your Vercel URL(s), comma-separated. *.vercel.app
      # preview deployments are always allowed by the API, so this is your prod domain.
      # e.g. https://mohd-zaid-portfolio.vercel.app
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: portfolio-cms
