object {
    width: 80%;
    height: 800px;
    border: 1px solid rgb(255, 255, 255);
    border-radius: 8px;
}



@media (max-width: 768px) {


    nav {
        width: 95%;
        height: auto;
        padding: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    nav a {
        margin: 5px 12px;
        font-size: 14px;
    }

    nav section {
        width: 100%;
        display: flex;
        justify-content: center;

    }

    .logo {

        height: 20px;

    .main {
        padding: 15px;

    object {
        width: 100%;
        height: 500px;
        border-radius: 6px;
